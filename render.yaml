# Render-specific settings
# https://render.com/docs

services:
  - type: web
    name: karbuin
    runtime: python
    plan: free
    branch: main
    buildCommand: ""
    startCommand: "python3 server.py --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/motors
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: KARBUIN_VERSION
        value: 1.1.2
      - key: KARBUIN_ENV
        value: production
    disks:
      - name: karbuin-data
        mountPath: /opt/render/project/src/data
        sizeGB: 1