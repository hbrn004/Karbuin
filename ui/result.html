<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicon-48.png">
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-180.png">
  <link rel="manifest" href="/assets/manifest.json">
  <title>Hasil Diagnosa — Karbuin</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="/css/footer.css">
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/">
      <img class="brand-logo" src="/assets/logo-mark-256.png" alt="Karbuin" width="36" height="36">
      <span class="brand-text">Karbuin</span>
    </a>
    <div id="topbar-title" class="muted" style="font-size: var(--fs-caption)">Hasil Diagnosa</div>
    <a href="/library" class="btn btn-ghost btn-sm">📚 Library</a>
  </div>
</header>

<main class="page">
  <div class="container">
    <div id="karbu-warning" class="karbu-warning-banner" style="display:none">
      <span class="karbu-warning-icon">⚠</span>
      <span class="karbu-warning-text"></span>
    </div>
    <div class="result-head">
      <div class="motor-tag" id="motor-tag">Motor belum dipilih</div>
      <h1 class="page-h1" id="motor-tag-h1">Memuat…</h1>
    </div>

    <div id="result-content">
      <!-- Diagnosis hero card -->
      <div id="diagnosis-card" class="diagnosis-card"></div>

      <!-- Ringkasan -->
      <div id="ringkasan" class="ringkasan mb-5"></div>

      <div class="result-layout">
        <div>
          <!-- Komponen yang dicurigai -->
          <div id="component-section" class="section-block"></div>

          <!-- Lokasi -->
          <div id="lokasi-section" class="section-block"></div>

          <!-- Cara cek -->
          <div id="cek-section" class="section-block"></div>

          <!-- Solusi -->
          <div id="solusi-section" class="section-block"></div>

          <!-- Estimasi biaya -->
          <div id="estimasi-section" class="section-block"></div>

          <!-- Risk + DIY + Time -->
          <div id="risk-diy"></div>

          <!-- Pertanyaan Lanjutan -->
          <div id="followups"></div>
        </div>

        <div>
          <!-- Kenapa sistem menyimpulkan ini? -->
          <div id="why-section"></div>

          <!-- Kemungkinan lainnya -->
          <div id="other-causes-section"></div>

          <!-- Share / Restart -->
          <div class="section-block">
            <h3>📤 Bagikan / Simpan</h3>
            <div class="flex flex-col gap-2">
              <button id="btn-share-wa" class="btn btn-primary btn-block">💬 Share ke Mekanik (WhatsApp)</button>
              <button id="btn-share-copy" class="btn btn-secondary btn-block">📋 Copy ke Clipboard</button>
              <button id="btn-library" class="btn btn-ghost btn-block">📚 Lihat Library Komponen</button>
              <button id="btn-restart" class="btn btn-ghost btn-block">🔄 Diagnosa Ulang</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <nav class="bottomnav">
    <a href="/" class="bottomnav-item">
      <span style="display:inline-flex;width:20px;height:20px">🏠</span>
      <span>Home</span>
    </a>
    <a href="/diagnose" class="bottomnav-item">
    <span style="display:inline-flex;width:20px;height:20px">🔍</span>
    <span>Diagnosa</span>
  </a>
  <a href="/library" class="bottomnav-item">
    <span style="display:inline-flex;width:20px;height:20px">📚</span>
    <span>Library</span>
  </a>
  <a href="/method" class="bottomnav-item">
    <span style="display:inline-flex;width:20px;height:20px">💡</span>
    <span>Metode</span>
  </a>
</nav>

<script src="/js/main.js"></script>
<script src="/js/api.js"></script>
<script src="/js/share.js"></script>
<script src="/js/result.js"></script>
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="/assets/logo-mark-256.png" alt="Karbuin" width="32" height="32">
        <div>
          <strong>Karbuin</strong>
          <span class="footer-tagline">Motorcycle Carburetor Diagnostic Expert</span>
        </div>
      </div>
      <nav class="footer-nav">
        <a href="/">Beranda</a>
        <a href="/diagnose">Diagnosa</a>
        <a href="/library">Library</a>
        <a href="/method">Metode</a>
      </nav>
      <div class="footer-meta">
        <span>v1.2.0 · Light Professional Theme</span>
        <span>© 2026 Karbuin</span>
      </div>
    </div>
  </footer>
</body>
</html>
